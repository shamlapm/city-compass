<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityCompass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">

        <div class="content">
            <h1>CityCompass</h1>

            <p>
                Discover nearby restaurants, hospitals, cafes,
                ATMs and parks around your location.
            </p>

            <button onclick="getLocation()">
                Find My Location
            </button>

            <p id="location"></p>
        </div>

    </section>

    <section class="services">

        <h2>Explore Nearby Services</h2>

        <div class="cards">

            <div class="card">
                <h3>Restaurants</h3>
                <p>Find nearby restaurants</p>
            </div>

            <div class="card">
                <h3>Hospitals</h3>
                <p>Locate nearby hospitals</p>
            </div>

            <div class="card">
                <h3>Cafes</h3>
                <p>Discover local cafes</p>
            </div>

            <div class="card">
                <h3>ATMs</h3>
                <p>Find nearby ATMs</p>
            </div>

            <div class="card">
                <h3>Parks</h3>
                <p>Explore green spaces</p>
            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
